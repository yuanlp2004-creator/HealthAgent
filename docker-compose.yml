services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: health
      POSTGRES_PASSWORD: health
      POSTGRES_DB: healthagent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health -d healthagent"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://health:health@postgres:5432/healthagent
      JWT_SECRET: ${JWT_SECRET:-please-change-me}
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      APP_DEBUG: "true"
    ports:
      - "8000:8000"

volumes:
  pgdata:
